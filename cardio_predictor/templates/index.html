<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cardiovascular Disease Prediction Portal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #f2f6f9, #e0ecf3);
            margin: 0;
            padding: 30px 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        a.button {
            display: block;
            padding: 14px;
            text-decoration: none;
            background-color: #0077cc;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border-radius: 10px;
            transition: background-color 0.3s ease;
        }

        a.button:hover {
            background-color: #005fa3;
        }

        @media screen and (max-width: 600px) {
            .container {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cardiovascular Prediction Portal</h1>
        <div class="button-group">
            <a href="/attack" class="button">Heart Attack Prediction</a>
            <a href="/cardio" class="button">Heart Disease Prediction</a>
        </div>
    </div>
</body>
</html>
